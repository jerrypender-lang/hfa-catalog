<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Human First Automations — Workflow Catalog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#060a12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;color:#fff;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}
#intro{background:#060a12;z-index:100;align-items:center;justify-content:center;cursor:pointer;}
#intro.fade-out{animation:iFade 0.9s ease forwards;}
@keyframes iFade{to{opacity:0;pointer-events:none;}}
#intro-canvas{position:absolute;inset:0;pointer-events:none;}

/* PARTNERSHIP INTRO STYLES */
.pi-wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:98vw;padding:0 16px;}

/* Phase 1: logos slide in from sides */
.pi-logos{display:flex;align-items:center;justify-content:center;gap:0;width:100%;margin-bottom:0;position:relative;height:300px;}
.pi-logo-hfa{opacity:0;transform:translateX(80px);transition:none;display:flex;align-items:center;justify-content:flex-start;width:44%;padding-left:28px;}
.pi-logo-hfa img{height:260px;width:auto;max-width:48vw;object-fit:contain;filter:none;}
.pi-logo-hfa.slide-in{animation:slideFromRight 1.6s cubic-bezier(0.16,1,0.3,1) forwards;}
.pi-logo-aia{opacity:0;transform:translateX(-80px);transition:none;display:flex;align-items:center;justify-content:center;width:44%;}
.pi-logo-aia img{height:260px;width:auto;max-width:48vw;object-fit:contain;filter:drop-shadow(0 0 28px rgba(74,222,128,0.5));}
.pi-logo-aia.slide-in{animation:slideFromLeft 1.6s cubic-bezier(0.16,1,0.3,1) forwards;}
@keyframes slideFromLeft{from{opacity:0;transform:translateX(-120px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideFromRight{from{opacity:0;transform:translateX(120px)}to{opacity:1;transform:translateX(0)}}

/* connector spark between logos */
.pi-connector{width:12%;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;}
.pi-x{font-size:44px;font-weight:300;color:rgba(255,255,255,0);opacity:0;transform:scale(0.5);transition:none;}
.pi-x.appear{animation:xAppear 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes xAppear{from{opacity:0;transform:scale(0.4)}to{opacity:1;transform:scale(1);color:rgba(74,222,128,0.9);}}

/* Phase 2: partnership label */
.pi-partnership{font-size:15px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0);margin-top:10px;text-align:center;opacity:0;}
.pi-partnership.appear{animation:fadeUp 0.7s ease forwards;color:rgba(74,222,128,0.65);}

/* glow line under logos */
.pi-glow-line{width:0;height:2px;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.5),rgba(167,139,250,0.5),transparent);margin:18px auto;transition:width 1.2s ease;}
.pi-glow-line.expand{width:min(600px,90vw);}

/* Phase 3: main statement */
.pi-statement{text-align:center;opacity:0;transform:translateY(12px);}
.pi-statement.appear{animation:fadeUp 0.8s ease forwards;}
.pi-statement-main{font-size:36px;font-weight:500;color:rgba(255,255,255,0.95);line-height:1.25;margin-bottom:14px;}
.pi-statement-sub{font-size:16px;color:rgba(255,255,255,0.4);letter-spacing:0.06em;line-height:1.6;}

/* Phase 4: tagline */
.pi-tagline{font-size:14px;color:rgba(74,222,128,0.5);letter-spacing:0.12em;text-transform:uppercase;margin-top:40px;opacity:0;}
.pi-tagline.appear{animation:fadeUp 0.6s ease forwards,iPulse 2s ease 0.6s infinite;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes iPulse{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes iFU{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.top-bar{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.back-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);font-size:12px;padding:7px 14px;border-radius:8px;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase;}
.screen-title{font-size:14px;font-weight:500;color:rgba(255,255,255,0.7);}
.screen-sub{font-size:11px;color:rgba(255,255,255,0.25);margin-left:auto;}
#screen-cats .cat-header{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.06);}
#screen-cats .cat-logo{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:5px;}
#screen-cats .cat-h{font-size:22px;font-weight:500;color:rgba(255,255,255,0.9);}
#screen-cats .cat-s{font-size:12px;color:rgba(255,255,255,0.3);margin-top:4px;}
.toggle-row{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.toggle-btn{flex:1;padding:9px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.4);font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;}
.toggle-btn.active-t{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.35);color:#4ADE80;}
.toggle-btn.active-a{background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.35);color:#a855f7;}
.auntie-badge{display:inline-block;width:6px;height:6px;border-radius:50%;background:#a855f7;margin-right:4px;vertical-align:middle;}
.no-auntie-badge{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ADE80;margin-right:4px;vertical-align:middle;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 16px 28px;}
.cat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 14px;cursor:pointer;transition:all 0.2s;position:relative;}
.cat-card:active{transform:scale(0.97);}
.cat-icon{font-size:24px;margin-bottom:10px;display:block;}
.cat-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);margin-bottom:4px;}
.cat-cnt{font-size:11px;color:rgba(255,255,255,0.3);}
.cat-arrow{position:absolute;bottom:14px;right:14px;font-size:15px;color:rgba(255,255,255,0.15);}
.cat-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.cat-footer-txt{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:0.04em;}
.fn-hero{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.fn-icon{font-size:28px;margin-bottom:8px;}
.fn-title{font-size:20px;font-weight:500;color:rgba(255,255,255,0.9);}
.fn-desc{font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px;line-height:1.55;}
.fn-grid{display:flex;flex-direction:column;gap:10px;padding:14px 16px 28px;}
.wf-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:11px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative;}
.wf-card:hover{border-color:rgba(255,255,255,0.14);}
.wf-card:active{transform:scale(0.98);}
.wf-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.wf-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.wf-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);}
.wf-desc{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.55;margin-bottom:10px;}
.wf-tags{display:flex;flex-wrap:wrap;gap:4px;}
.wf-tag{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);}
.wf-run{position:absolute;bottom:14px;right:14px;font-size:11px;color:rgba(74,222,128,0.6);letter-spacing:0.05em;text-transform:uppercase;}
.wf-auntie-tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(167,139,250,0.1);color:rgba(167,139,250,0.8);border:1px solid rgba(167,139,250,0.2);margin-bottom:5px;}
.wf-hfa-tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(74,222,128,0.1);color:rgba(74,222,128,0.7);border:1px solid rgba(74,222,128,0.2);margin-bottom:5px;}
.demo-scene{background:#060a12;}
.demo-stage{position:relative;overflow-x:hidden;overflow-y:visible;display:flex;align-items:stretch;}
.demo-inner{position:relative;width:560px;max-width:100%;margin:0 auto;flex-shrink:0;}
.dgrid{position:absolute;inset:0;opacity:0.05;pointer-events:none;}
.wsvg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;}
.wire-bg{fill:none;stroke:#fff;stroke-width:1;opacity:0.07;}
.wire-lit{fill:none;stroke-width:2;opacity:0;transition:opacity 1s;}
.wire-lit.on{opacity:1;}
.cw{position:absolute;box-sizing:border-box;overflow:visible;}
@keyframes fl0{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes fl1{0%,100%{transform:translateY(-4px)}50%{transform:translateY(3px)}}
@keyframes fl2{0%,100%{transform:translateY(-2px)}50%{transform:translateY(5px)}}
@keyframes fl3{0%,100%{transform:translateY(4px)}50%{transform:translateY(-3px)}}
.fl0{animation:fl0 4s ease-in-out infinite;}
.fl1{animation:fl1 5s ease-in-out infinite;}
.fl2{animation:fl2 4.6s ease-in-out infinite;}
.fl3{animation:fl3 5.3s ease-in-out infinite;}
.port{position:absolute;width:10px;height:10px;border-radius:50%;background:#060a12;border:1.5px solid rgba(255,255,255,0.2);z-index:20;transition:all 0.4s;}
.port.lit{background:#4ADE80;border-color:#4ADE80;box-shadow:0 0 8px rgba(74,222,128,0.9);}
.nd-label{font-size:10px;font-weight:500;text-align:center;color:rgba(255,255,255,0.7);margin-top:5px;word-break:break-word;line-height:1.3;max-width:100%;}
.nd-status{font-size:9px;text-align:center;color:rgba(255,255,255,0.2);margin-top:2px;min-height:12px;}
.nd-status.run{color:#4ADE80;text-shadow:0 0 6px rgba(74,222,128,0.5);}
.nd-status.run-p{color:#a855f7;}
.nd-status.run-b{color:#60a5fa;}
.nd-status.run-y{color:#fbbf24;}
.nd-status.ok{color:rgba(74,222,128,0.5);}
.cap-wrap{height:52px;display:flex;align-items:center;justify-content:center;background:#060a12;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
.cap-txt{font-size:13px;color:rgba(255,255,255,0.85);letter-spacing:0.04em;opacity:0;transition:opacity 0.7s;text-align:center;padding:0 20px;}
.cap-txt.show{opacity:1;}
.demo-ctrl{background:#040810;padding:12px 14px;border-top:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.run-btn{flex:1;padding:10px;font-size:11px;font-weight:500;cursor:pointer;border-radius:8px;background:rgba(74,222,128,0.08);color:#4ADE80;border:1px solid rgba(74,222,128,0.25);letter-spacing:0.06em;text-transform:uppercase;}
.run-btn:disabled{opacity:0.3;cursor:not-allowed;}
.d-sbar{font-size:10px;color:rgba(255,255,255,0.2);text-align:right;letter-spacing:0.05em;text-transform:uppercase;}
.otags{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;margin-top:4px;padding:0 2px;}
.ctag{display:inline-block;font-size:8px;padding:1px 5px;border-radius:20px;background:rgba(74,222,128,0.12);color:rgba(74,222,128,0.8);border:1px solid rgba(74,222,128,0.25);}
.ctag-p{display:inline-block;font-size:8px;padding:1px 5px;border-radius:20px;background:rgba(167,139,250,0.12);color:rgba(167,139,250,0.85);border:1px solid rgba(167,139,250,0.25);}
.ctag-a{display:inline-block;font-size:8px;padding:1px 5px;border-radius:20px;background:rgba(251,191,36,0.12);color:rgba(251,191,36,0.8);border:1px solid rgba(251,191,36,0.25);}
.ctag-b{display:inline-block;font-size:8px;padding:1px 5px;border-radius:20px;background:rgba(96,165,250,0.12);color:rgba(96,165,250,0.8);border:1px solid rgba(96,165,250,0.25);}
.osec{background:#040810;border-top:1px solid rgba(255,255,255,0.04);padding:14px;display:none;flex-shrink:0;}
.ocard{border-radius:10px;border:1px solid rgba(255,255,255,0.07);background:linear-gradient(145deg,#0f1824,#0a1018);padding:12px 14px;margin-bottom:8px;font-size:12px;line-height:1.6;opacity:0;transform:translateY(6px);transition:opacity 0.5s,transform 0.5s;color:rgba(255,255,255,0.65);}
.ocard.show{opacity:1;transform:none;}
.olb{font-size:9px;font-weight:500;color:rgba(74,222,128,0.6);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.topt{padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;margin-bottom:4px;font-size:12px;cursor:pointer;color:rgba(255,255,255,0.6);}
.topt.sel{border-color:rgba(74,222,128,0.5);background:rgba(74,222,128,0.08);color:#4ADE80;}
.d2grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.d2card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:9px 11px;}
.d2n{font-size:12px;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:3px;}
.d2ok{font-size:11px;color:rgba(74,222,128,0.7);}
.reset-btn{width:100%;padding:9px;font-size:11px;cursor:pointer;border-radius:8px;margin-top:4px;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.06);letter-spacing:0.04em;text-transform:uppercase;}
.cta-block{background:#060a12;border-top:1px solid rgba(255,255,255,0.06);padding:20px;flex-shrink:0;display:none;}
.cta-block.show{display:block;}
.cta-inner{background:linear-gradient(135deg,rgba(74,222,128,0.08),rgba(74,222,128,0.03));border:1px solid rgba(74,222,128,0.2);border-radius:14px;padding:20px;text-align:center;}
.cta-tag{font-size:10px;color:rgba(74,222,128,0.7);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.cta-head{font-size:17px;font-weight:500;color:rgba(255,255,255,0.9);margin-bottom:6px;}
.cta-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:16px;line-height:1.55;}
.cta-btn{display:block;width:100%;padding:13px;background:#4ADE80;color:#060a12;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;}
.cta-note{font-size:10px;color:rgba(255,255,255,0.2);margin-top:10px;}

/* DOCUMENT POP-OUT ANIMATION */
.doc-pop-container{position:absolute;left:50%;top:0;transform:translateX(-50%);pointer-events:none;z-index:50;width:200px;display:flex;flex-wrap:wrap;justify-content:center;gap:3px;}
.doc-chip{position:absolute;opacity:0;transform:translateY(0px) scale(0.4);font-size:9px;background:rgba(20,10,30,0.92);border:1px solid rgba(167,139,250,0.45);border-radius:12px;padding:2px 7px;color:rgba(220,200,255,0.92);white-space:nowrap;pointer-events:none;transition:none;}
@keyframes docPop{
  0%   {opacity:0;transform:translateX(-50%) translateY(0px) scale(0.5);}
  12%  {opacity:1;transform:translateX(-50%) translateY(-10px) scale(1.08);}
  25%  {opacity:1;transform:translateX(-50%) translateY(-18px) scale(1);}
  72%  {opacity:1;transform:translateX(-50%) translateY(-18px) scale(1);}
  100% {opacity:0;transform:translateX(-50%) translateY(-32px) scale(0.85);}
}
</style>
</head>

var navStack=[];
var currentMode='all';
var orbitAF=null;
var demoRunning=false;
var demoWires={};

function goTo(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function goBack(){if(navStack.length>0){goTo(navStack.pop());}else{goTo('screen-cats');}}
function push(from,to){navStack.push(from);goTo(to);}

function setMode(m){
  currentMode=m;
  document.getElementById('tb-all').classList.remove('active-t','active-a');
  document.getElementById('tb-auntie').classList.remove('active-t','active-a');
  document.getElementById('tb-plain').classList.remove('active-t','active-a');
  if(m==='all') document.getElementById('tb-all').classList.add('active-t');
  else if(m==='auntie') document.getElementById('tb-auntie').classList.add('active-a');
  else document.getElementById('tb-plain').classList.add('active-t');
  buildCatGrid();
}

function filterWfs(wfs){
  if(currentMode==='all') return wfs;
  if(currentMode==='auntie') return wfs.filter(function(w){return w.auntie;});
  return wfs.filter(function(w){return !w.auntie;});
}

var CC=['rgba(251,113,133,0.07)','rgba(74,222,128,0.07)','rgba(251,191,36,0.07)','rgba(251,113,133,0.07)','rgba(96,165,250,0.07)','rgba(167,139,250,0.07)','rgba(96,165,250,0.07)','rgba(74,222,128,0.07)','rgba(251,191,36,0.07)','rgba(167,139,250,0.07)'];

function buildCatGrid(){
  var totalAll=0;
  CATS.forEach(function(c){CATS.forEach&&(totalAll+=c.workflows?c.workflows.length:0);});
  var total=0;CATS.forEach(function(c){total+=c.workflows.length;});
  document.getElementById('cat-h-sub').textContent=total+' workflows across '+CATS.length+' industries';
  var g=document.getElementById('cat-grid');g.innerHTML='';
  CATS.forEach(function(cat,i){
    var filtered=filterWfs(cat.workflows);
    if(filtered.length===0) return;
    var d=document.createElement('div');d.className='cat-card';
    d.style.background='rgba(255,255,255,0.03)';
    var hfa=filtered.filter(function(w){return w.hfa;}).length;
    var hfaStr=hfa>0?' <span style="font-size:9px;color:rgba(74,222,128,0.6);background:rgba(74,222,128,0.1);padding:1px 5px;border-radius:10px;border:1px solid rgba(74,222,128,0.2);">'+hfa+' live</span>':'';
    d.innerHTML='<span class="cat-icon">'+cat.icon+'</span><div class="cat-name">'+cat.name+hfaStr+'</div><div class="cat-cnt">'+filtered.length+' workflow'+(filtered.length!==1?'s':'')+'</div><div class="cat-arrow">&#8250;</div>';
    d.addEventListener('click',function(){openCat(cat);});
    d.addEventListener('mouseover',function(){this.style.background=CC[i];});
    d.addEventListener('mouseout',function(){this.style.background='rgba(255,255,255,0.03)';});
    g.appendChild(d);
  });
}

function openCat(cat){
  var filtered=filterWfs(cat.workflows);
  document.getElementById('fn-screen-title').textContent=cat.name;
  document.getElementById('fn-screen-sub').textContent=filtered.length+' workflows';
  document.getElementById('fn-hero').innerHTML='<div class="fn-icon">'+cat.icon+'</div><div class="fn-title">'+cat.name+'</div><div class="fn-desc">'+cat.desc+'</div>';
  var fg=document.getElementById('fn-grid');fg.innerHTML='';
  filtered.forEach(function(wf){
    var c=document.createElement('div');c.className='wf-card';
    var hbadge=wf.hfa?'<span class="wf-hfa-tag"><span style="width:5px;height:5px;border-radius:50%;background:#4ADE80;display:inline-block;margin-right:4px;"></span>Built for HFA</span><br>':'';
    var abadge=wf.auntie?'<span class="wf-auntie-tag"><span style="width:5px;height:5px;border-radius:50%;background:#a855f7;display:inline-block;margin-right:4px;"></span>Uses Content Auntie</span><br>':'';
    c.innerHTML='<div class="wf-top"><div class="wf-icon" style="background:'+wf.bg+'"><span style="font-size:17px;">'+wf.icon+'</span></div><div class="wf-name">'+wf.name+'</div></div>'+hbadge+abadge+'<div class="wf-desc">'+wf.desc+'</div><div class="wf-tags">'+wf.tags.map(function(t){return '<span class="wf-tag">'+t+'</span>';}).join('')+'</div><div class="wf-run">Run demo &#8250;</div>';
    c.addEventListener('click',function(){openDemo(wf);});
    fg.appendChild(c);
  });
  push('screen-cats','screen-fns');
}

    oc.innerHTML='<div class="olb">'+o.label+'</div>'+o.body;
    osec.appendChild(oc);
  });
  var rb2=document.createElement('button');rb2.className='reset-btn';rb2.innerHTML='&#8635; Run again';
  rb2.onclick=function(){resetDemo(d);};osec.appendChild(rb2);
  var cta=document.createElement('div');cta.className='cta-block';cta.id='dcta';
  cta.innerHTML='<div class="cta-inner"><div class="cta-tag">Ready to build this for your business?</div><div class="cta-head">Let\'s talk about what\'s possible</div><div class="cta-sub">Free 30-minute discovery call. We\'ll map out exactly which automations would save you the most time.</div><a class="cta-btn" href="https://humanfirstautomations.com" target="_blank">Book a free discovery call</a><div class="cta-note">humanfirstautomations.com &nbsp;&#183;&nbsp; No commitment required</div></div>';
  scene.appendChild(stage);scene.appendChild(capW);scene.appendChild(ctrl);scene.appendChild(osec);scene.appendChild(cta);
  mount.appendChild(scene);
  setTimeout(function(){buildDemoWires(d);},80);
  push('screen-fns','screen-demo');
}

function buildDemoWires(d){
  var svg=document.getElementById('demo-wsvg');if(!svg) return;
  svg.innerHTML='';demoWires={};
  d.wires.forEach(function(w){
    var a=portXY(w.f),b=portXY(w.t);if(!a||!b) return;
    var dx=Math.abs(b.x-a.x)*0.5;
    var dd='M'+a.x+','+a.y+' C'+(a.x+dx)+','+a.y+' '+(b.x-dx)+','+b.y+' '+b.x+','+b.y;
    var bg=document.createElementNS(NS,'path');bg.setAttribute('d',dd);bg.setAttribute('class','wire-bg');svg.appendChild(bg);
    var lit=document.createElementNS(NS,'path');lit.setAttribute('d',dd);lit.setAttribute('class','wire-lit');lit.setAttribute('stroke',w.c);svg.appendChild(lit);
    var g=document.createElementNS(NS,'g');g.style.display='none';
    [[14,0.07],[9,0.2],[5,0.55],[2.5,1,'#fff']].forEach(function(cfg){
      var c=document.createElementNS(NS,'circle');c.setAttribute('r',cfg[0]);c.setAttribute('fill',cfg[2]||w.c);c.setAttribute('opacity',cfg[1]);g.appendChild(c);
    });
    svg.appendChild(g);
    demoWires[w.id]={bg:bg,lit:lit,spark:g};
  });
}

function portXY(pid){
  var inner=document.querySelector('#demo-mount .demo-inner');if(!inner) return null;
  var cr=inner.getBoundingClientRect();
  var p=document.getElementById(pid);if(!p) return null;
  var r=p.getBoundingClientRect();
  return {x:r.left-cr.left+5,y:r.top-cr.top+5};
}

function sparkAnim(wid,dur){
  return new Promise(function(res){
    var w=demoWires[wid];if(!w){res();return;}
    var sp=w.spark,lit=w.lit,path=w.bg;
    sp.style.display='block';dur=dur||2000;
    var len=path.getTotalLength(),t0=null;
    function step(ts){
      if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1),e=p<0.5?2*p*p:-1+(4-2*p)*p;
      var pt=path.getPointAtLength(e*len);
      sp.querySelectorAll('circle').forEach(function(c){c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);});
      if(p<1) requestAnimationFrame(step);
      else{sp.style.display='none';lit.classList.add('on');res();}
    }
    requestAnimationFrame(step);
  });
}

function setDemoNode(d,ni,state,sc){
  var n=d.nodes[ni];if(!n) return;
  var el=document.getElementById(n.id);if(!el) return;
  var s=document.getElementById('ds_'+n.id);
  if(s){
    if(state==='active'){s.className='nd-status '+(sc||'run');s.textContent='Processing...';}
    else if(state==='done'){s.className='nd-status ok';s.textContent='Complete';}
    else{s.className='nd-status';s.textContent='';}
  }
  if(n.orb){
    var ob=document.getElementById('ob_'+n.id);
    if(ob) ob.setAttribute('stroke',state==='active'?(n.orbColor==='amber'?'rgba(251,191,36,0.8)':n.orbColor==='indigo'?'rgba(129,140,248,0.8)':'rgba(167,139,250,0.8)'):(n.orbColor==='amber'?'rgba(251,191,36,0.35)':n.orbColor==='indigo'?'rgba(129,140,248,0.35)':'rgba(167,139,250,0.35)'));
    if(state==='active'){el.style.filter='drop-shadow(0 0 16px '+(n.orbColor==='amber'?'rgba(251,191,36,0.5)':n.orbColor==='indigo'?'rgba(129,140,248,0.5)':'rgba(167,139,250,0.5)')+')';startOrbit(n.id);if(d&&d.outputs){var docLabels=extractDocLabels(d.outputs);if(docLabels.length>0)popDocs(el,docLabels);}}
    else{el.style.filter='none';stopOrbit();}
  } else {
    el.style.filter=state==='active'?'drop-shadow(0 0 10px rgba(74,222,128,0.3))':state==='done'?'drop-shadow(0 0 4px rgba(74,222,128,0.1))':'none';
  }
}

function startOrbit(nid){
  stopOrbit();var r1=document.getElementById('or1_'+nid),r2=document.getElementById('or2_'+nid),t0=null;
  function step(ts){if(!t0)t0=ts;var a=((ts-t0)/18)%360;
    if(r1){r1.style.transformOrigin='55px 50px';r1.style.transform='rotate('+a+'deg)';}
    if(r2){r2.style.transformOrigin='55px 50px';r2.style.transform='rotate('+(-a*0.7)+'deg)';}
    orbitAF=requestAnimationFrame(step);}
  orbitAF=requestAnimationFrame(step);
}

// Extract short label tokens from output HTML for the doc chips
function extractDocLabels(outputs){
  var labels=[];
  outputs.forEach(function(o){
    // Try to pull ctag spans first (short pill labels)
    var tagRe=/<span class="ctag[^"]*">([^<]+)<\/span>/g;
    var m;var found=[];
    while((m=tagRe.exec(o.body))!==null){found.push(m[1]);}
    if(found.length>0){
      labels=labels.concat(found.slice(0,8));
    } else {
      // Fall back to the output label itself
      labels.push(o.label);
    }
  });
  // Deduplicate and cap at 10
  var seen={};var uniq=[];
  labels.forEach(function(l){if(!seen[l]){seen[l]=true;uniq.push(l);}});
  return uniq.slice(0,10);
}

function popDocs(nodeEl, labels){
  // Remove any existing container
  var old=nodeEl.querySelector('.doc-pop-container');
  if(old) old.parentNode.removeChild(old);

  var container=document.createElement('div');
  container.className='doc-pop-container';
  // position it above the orb SVG (orb is 90px tall, container sits above)
  container.style.cssText='position:absolute;left:50%;top:-4px;transform:translateX(-50%);pointer-events:none;z-index:50;';
  nodeEl.appendChild(container);

  var cols=[-70,-40,-10,20,50,-60,-25,10,40,-15]; // x offsets for up to 10 chips
  var rows=[ -10,-18,-26,-18,-10, -38,-46,-46,-38,-54]; // y offsets

  labels.forEach(function(label,i){
    var delay=400+i*750; // stagger each chip — slow enough to read each one
    var chip=document.createElement('div');
    chip.className='doc-chip';
    chip.textContent='📄 '+label;
    chip.style.cssText='left:50%;top:0;transform:translateX(-50%) translateY(0);';
    container.appendChild(chip);
    setTimeout(function(){
      chip.style.animation='docPop 2.6s ease forwards';
    }, delay);
  });

  // Remove container after all chips done
  setTimeout(function(){
    if(container.parentNode) container.parentNode.removeChild(container);
  }, 400 + labels.length*750 + 3200);
}

function setDemoCap(t){var el=document.getElementById('dcap');if(!el) return;el.classList.remove('show');setTimeout(function(){el.textContent=t;el.classList.add('show');},400);}
function hideDemoCap(){var el=document.getElementById('dcap');if(el) el.classList.remove('show');}
function sl(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function runDemo(d){
  if(demoRunning) return;demoRunning=true;
  var rb=document.getElementById('drun');rb.disabled=true;
  document.getElementById('dosec').style.display='none';
  document.getElementById('dcta').classList.remove('show');
  document.querySelectorAll('#dosec .ocard').forEach(function(c){c.classList.remove('show');});
  buildDemoWires(d);d.nodes.forEach(function(_,i){setDemoNode(d,i,'');});
  document.getElementById('dsbar').textContent='Running';
  var capIdx=0;
  for(var si=0;si<d.steps.length;si++){
    var step=d.steps[si];
    if(step.node!==undefined){
      if(d.captions[capIdx]) setDemoCap(d.captions[capIdx]);capIdx++;
      setDemoNode(d,step.node,'active',step.sc);
      await sl(step.dur||2000);setDemoNode(d,step.node,'done');await sl(400);
    } else if(step.spark){
      await sparkAnim(step.spark,step.sparkDur||2000);await sl(200);
    } else if(step.sparks){
      if(d.captions[capIdx]) setDemoCap(d.captions[capIdx]);capIdx++;
      var pairs=step.nodePairs||[];
      var ps=step.sparks.map(function(sp,idx){
        return sparkAnim(sp.id,sp.d||1800).then(async function(){
          if(pairs[idx]){setDemoNode(d,pairs[idx].n,'active',pairs[idx].sc);await sl(pairs[idx].d||2000);setDemoNode(d,pairs[idx].n,'done');}
        });
      });
      await Promise.all(ps);await sl(400);
    }
  }
  if(d.captions[d.captions.length-1]) setDemoCap(d.captions[d.captions.length-1]);
  document.getElementById('dsbar').textContent='Complete';
  await sl(2800);hideDemoCap();await sl(400);
  // Shrink stage to natural height now that outputs are visible
  var stageEl=document.querySelector('#demo-mount .demo-stage');if(stageEl)stageEl.style.height=(d.stageH+20)+'px';
  var os=document.getElementById('dosec');os.style.display='block';
  var ocs=os.querySelectorAll('.ocard');
  for(var oi=0;oi<ocs.length;oi++){await sl(300);ocs[oi].classList.add('show');}
  await sl(600);document.getElementById('dcta').classList.add('show');
  document.getElementById('demo-scroll').scrollTop+=200;
  demoRunning=false;rb.disabled=false;
}

function resetDemo(d){
  stopOrbit();demoRunning=false;d.nodes.forEach(function(_,i){setDemoNode(d,i,'');});
  var os=document.getElementById('dosec');if(os) os.style.display='none';
  var cta=document.getElementById('dcta');if(cta) cta.classList.remove('show');
  document.querySelectorAll('#dosec .ocard').forEach(function(c){c.classList.remove('show');});
  buildDemoWires(d);hideDemoCap();
  var sb=document.getElementById('dsbar');if(sb) sb.textContent='Ready';
  var rb=document.getElementById('drun');if(rb) rb.disabled=false;
}

// ═══ INTRO ENGINE ═══
(function(){
  var canvas=document.getElementById('intro-canvas');
  var ctx=canvas.getContext('2d');
  var W,H,particles=[],sparks=[],raf;
  var gone=false;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a);}

  for(var i=0;i<60;i++){
    particles.push({x:Math.random(),y:Math.random(),
      vx:rand(-0.12,0.12),vy:rand(-0.07,0.07),
      r:rand(0.6,2.4),o:rand(0.04,0.18),
      color:Math.random()<0.5?'74,222,128':Math.random()<0.5?'167,139,250':'96,165,250'});
  }

  function spawnSpark(){
    if(gone) return;
    var e=Math.floor(Math.random()*4),sx,sy,tx,ty;
    if(e===0){sx=rand(0,W);sy=0;tx=rand(0,W);ty=H;}
    else if(e===1){sx=W;sy=rand(0,H);tx=0;ty=rand(0,H);}
    else if(e===2){sx=rand(0,W);sy=H;tx=rand(0,W);ty=0;}
    else{sx=0;sy=rand(0,H);tx=W;ty=rand(0,H);}
    sparks.push({sx:sx,sy:sy,tx:tx,ty:ty,p:0,
      spd:rand(0.002,0.006),
      color:Math.random()<0.5?'74,222,128':Math.random()<0.5?'167,139,250':'96,165,250',
      done:false});
  }
  setInterval(spawnSpark,700);
  spawnSpark();spawnSpark();spawnSpark();

  function draw(){
    if(gone){ctx.clearRect(0,0,W,H);return;}
    ctx.clearRect(0,0,W,H);
    particles.forEach(function(p){
      p.x+=p.vx/W;p.y+=p.vy/H;
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;
      if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+p.color+','+p.o+')';ctx.fill();
    });
    sparks.forEach(function(sp){
      if(sp.done) return;
      sp.p=Math.min(sp.p+sp.spd,1);
      var e2=sp.p<0.5?2*sp.p*sp.p:-1+(4-2*sp.p)*sp.p;
      var cx=sp.sx+(sp.tx-sp.sx)*e2,cy=sp.sy+(sp.ty-sp.sy)*e2;
      var ep=Math.max(0,e2-0.05);
      var cx2=sp.sx+(sp.tx-sp.sx)*ep,cy2=sp.sy+(sp.ty-sp.sy)*ep;
      var gr=ctx.createLinearGradient(cx2,cy2,cx,cy);
      gr.addColorStop(0,'rgba('+sp.color+',0)');
      gr.addColorStop(1,'rgba('+sp.color+',0.8)');
      ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx,cy);
      ctx.strokeStyle=gr;ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,1)';ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);
      ctx.fillStyle='rgba('+sp.color+',0.2)';ctx.fill();
      if(sp.p>=1) sp.done=true;
    });
    sparks=sparks.filter(function(s){return !s.done;});
    raf=requestAnimationFrame(draw);
  }
  draw();

  // ── CHOREOGRAPHED PARTNERSHIP SEQUENCE ──
  function sl(ms){return new Promise(function(r){setTimeout(r,ms);});}

  async function runSequence(){
    // Beat 1 (0.6s): AIA logo slides in from left
    await sl(600);
    document.getElementById('pi-hfa').classList.add('slide-in');

    // Beat 2 (1.0s): HFA slides in from right — slight delay so they travel visibly
    await sl(500);
    document.getElementById('pi-aia').classList.add('slide-in');

    // Beat 3 (2.5s): × connector sparks into existence after logos land
    await sl(1300);
    var xEl=document.getElementById('pi-x');
    xEl.classList.add('appear');

    // Pulse the center with a canvas burst
    var cx2=W/2,cy2=H/2-40;
    for(var b=0;b<8;b++){
      var angle=b*(Math.PI*2/8);
      sparks.push({
        sx:cx2,sy:cy2,
        tx:cx2+Math.cos(angle)*180,
        ty:cy2+Math.sin(angle)*120,
        p:0,spd:0.018,
        color:b%2===0?'74,222,128':'167,139,250',
        done:false
      });
    }

    // Beat 4 (2.0s): "A Strategic Partnership" fades up
    await sl(600);
    document.getElementById('pi-partner').classList.add('appear');

    // Beat 5 (2.8s): Glow line expands across
    await sl(800);
    document.getElementById('pi-line').classList.add('expand');

    // Beat 6 (3.8s): Main statement appears
    await sl(1000);
    document.getElementById('pi-stmt').classList.add('appear');

    // Beat 7 (5.2s): Tap prompt pulses in
    await sl(1400);
    document.getElementById('pi-tap').classList.add('appear');
  }

  runSequence();

  // Auto-advance at 11 seconds
  var autoTimer=setTimeout(function(){skipIntro();},11000);

  window.skipIntro=function(){
    clearTimeout(autoTimer);
    if(gone) return;
    gone=true;
    var intro=document.getElementById('intro');
    intro.classList.add('fade-out');
    setTimeout(function(){
      intro.classList.remove('active');
      cancelAnimationFrame(raf);
      ctx.clearRect(0,0,W,H);
      var gc=document.getElementById('screen-cats');
      gc.classList.add('active');
      gc.style.animation='reveal 0.6s ease forwards';
    },880);
  };

  var st=document.createElement('style');
  st.textContent='@keyframes reveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}';
  document.head.appendChild(st);
})();
</script>
